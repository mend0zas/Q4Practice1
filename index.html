<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 1</title>
</head>
<body>
    <input type="text" class="form-control" id="Age" placeholder="type here..">
    <button class="btn btn-info" onclick="checkAge()">Check</button>
    <script>
        function checkAge(){
            var kWh = document.getElementById("Age").value;
            let cat1 = "Lifeline Consumer";
            if (isNaN(kWh) || kWh < 0) {
                alert("Please input a valid number.");
            }
            else if(kWh <= 100){
                alert(cat1 + ": You have a discounted rate.")
            }
           
    </script>
</body>
</html>
